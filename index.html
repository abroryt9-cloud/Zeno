<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeno</title>
    <style>
      :root {
        --bg1: #7c3aed;
        --bg2: #2563eb;
        --card: rgba(255, 255, 255, 0.92);
        --text: #0f172a;
        --muted: rgba(15, 23, 42, 0.65);
        --ring: rgba(99, 102, 241, 0.35);
        --primary1: #7c3aed;
        --primary2: #2563eb;
        --success: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(1200px circle at 20% 10%, rgba(124, 58, 237, 0.45), transparent 55%),
          radial-gradient(1000px circle at 80% 20%, rgba(37, 99, 235, 0.45), transparent 52%),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 14px;
      }

      .app {
        width: 100%;
        max-width: 460px;
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 22px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        backdrop-filter: blur(10px);
        max-height: calc(100vh - 28px);
        display: flex;
        flex-direction: column;
      }

      .cardHeader {
        padding: 18px 18px 10px 18px;
        text-align: center;
      }

      .brand {
        margin: 0;
        letter-spacing: 0.14em;
        font-weight: 900;
        font-size: 22px;
      }

      .subtitle {
        margin: 8px 0 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .content {
        padding: 12px 18px 16px 18px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .screen {
        display: none;
        flex-direction: column;
        min-height: 0;
      }
      .screen.active {
        display: flex;
        animation: fadeIn 140ms ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fieldLabel {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .input {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.85);
        padding: 0 14px;
        font-size: 15px;
        outline: none;
        transition: box-shadow 120ms ease, border-color 120ms ease;
      }

      .input:focus {
        border-color: rgba(99, 102, 241, 0.4);
        box-shadow: 0 0 0 5px var(--ring);
      }

      .btn {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        color: white;
        font-weight: 700;
        font-size: 15px;
        background: linear-gradient(135deg, var(--primary1), var(--primary2));
        box-shadow: 0 12px 25px rgba(37, 99, 235, 0.22);
        transition: opacity 120ms ease, filter 120ms ease, transform 100ms ease;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        filter: grayscale(10%);
        background: #9aa3b2;
        box-shadow: none;
      }

      .btnRow {
        margin-top: 12px;
      }

      .codeWrap {
        margin-top: 2px;
      }

      .codeRow {
        display: flex;
        justify-content: space-between;
        gap: 4px;
      }

      .codeInput {
        width: 50px;
        height: 60px;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.85);
        outline: none;
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        transition: box-shadow 120ms ease, border-color 120ms ease;
      }

      .codeInput:focus {
        border-color: rgba(99, 102, 241, 0.45);
        box-shadow: 0 0 0 5px var(--ring);
      }

      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12.5px;
        text-align: center;
        line-height: 1.25;
      }

      .resend {
        margin-top: 12px;
        text-align: center;
      }

      .linkBtn {
        background: none;
        border: none;
        color: rgba(37, 99, 235, 0.9);
        font-weight: 700;
        cursor: pointer;
        padding: 0;
        text-decoration: none;
      }

      .linkBtn:hover {
        text-decoration: underline;
      }

      .mainWelcome {
        text-align: center;
        padding-top: 8px;
      }

      .welcomeTitle {
        margin: 0;
        font-size: 18px;
        font-weight: 900;
      }

      .welcomeSub {
        margin: 10px 0 0 0;
        color: var(--muted);
        font-size: 13.5px;
      }

      .welcomeBadge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(22, 163, 74, 0.25);
        background: rgba(22, 163, 74, 0.08);
        color: var(--success);
        font-weight: 800;
        font-size: 13px;
      }

      /* Компактность для телефонов */
      @media (max-width: 420px) {
        body {
          padding: 10px;
        }
        .card {
          border-radius: 18px;
          max-height: calc(100vh - 20px);
        }
        .cardHeader {
          padding: 16px 14px 8px 14px;
        }
        .content {
          padding: 10px 14px 14px 14px;
        }
        .subtitle {
          font-size: 12.5px;
        }
        .btn {
          height: 44px;
        }
        .codeInput {
          width: 50px;
          height: 60px;
          border-radius: 14px;
        }
        .codeRow {
          gap: 3px;
        }
      }

      /* Очень маленькие экраны: чуть уменьшаем зазоры, но ширину полей оставляем 50px */
      @media (max-width: 360px) {
        body {
          padding: 0;
        }
        .app {
          max-width: 100%;
        }
        .content {
          padding-left: 10px;
          padding-right: 10px;
        }
        .codeRow {
          gap: 2px;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="card" role="application" aria-label="Zeno">
        <div class="cardHeader">
          <h1 class="brand">ZENO</h1>
          <p class="subtitle" id="subtitleText">Вход по номеру телефона</p>
        </div>

        <div class="content">
          <section class="screen active" id="screen-enter" aria-label="Ввод номера">
            <label class="fieldLabel" for="phone">Номер телефона</label>
            <input
              class="input"
              id="phone"
              type="tel"
              inputmode="tel"
              autocomplete="tel"
              placeholder="+7 999 123-45-67"
            />

            <div class="btnRow">
              <button class="btn" id="btnNext" type="button" disabled>Далее</button>
            </div>
          </section>

          <section class="screen" id="screen-code" aria-label="Ввод кода">
            <label class="fieldLabel" for="codeInputs">Код подтверждения</label>

            <div class="codeWrap">
              <div class="codeRow" id="codeInputs" aria-label="Введите 6-значный код">
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
              </div>
            </div>

            <div class="btnRow">
              <button class="btn" id="btnConfirm" type="button" disabled>Подтвердить</button>
            </div>

            <div class="resend">
              <button class="linkBtn" id="resendLink" type="button">
                Не пришел код? Отправить снова
              </button>
            </div>
          </section>

          <section class="screen" id="screen-main" aria-label="Главный экран">
            <div class="mainWelcome">
              <p class="welcomeTitle" id="welcomeTitle">Привет, Пользователь!</p>
              <p class="welcomeSub">Добро пожаловать в Zeno!</p>
              <div class="welcomeBadge">
                <span aria-hidden="true">✓</span>
                <span>Вход выполнен</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const phoneEl = document.getElementById("phone");
      const btnNext = document.getElementById("btnNext");

      const screenEnter = document.getElementById("screen-enter");
      const screenCode = document.getElementById("screen-code");
      const screenMain = document.getElementById("screen-main");

      const btnConfirm = document.getElementById("btnConfirm");
      const codeInputsWrap = document.getElementById("codeInputs");
      const codeInputs = Array.from(codeInputsWrap.querySelectorAll("input.codeInput"));

      const resendLink = document.getElementById("resendLink");

      const welcomeTitle = document.getElementById("welcomeTitle");

      let currentPhoneDigits = "";

      function digitsOnly(s) {
        return String(s || "").replace(/\D/g, "");
      }

      function setScreen(which) {
        screenEnter.classList.remove("active");
        screenCode.classList.remove("active");
        screenMain.classList.remove("active");

        if (which === "enter") screenEnter.classList.add("active");
        if (which === "code") screenCode.classList.add("active");
        if (which === "main") screenMain.classList.add("active");
      }

      function checkCodeComplete() {
        // Активируем кнопку только когда ВСЕ 6 полей заполнены цифрами.
        const code = codeInputs.map((el) => el.value).join("");
        const ok = /^\d{6}$/.test(code);
        btnConfirm.disabled = !ok;
        return ok;
      }

      function getCode() {
        return codeInputs.map((el) => el.value).join("");
      }

      function clearCodeInputs() {
        codeInputs.forEach((el) => (el.value = ""));
        btnConfirm.disabled = true;
      }

      function focusCodeIndex(i) {
        const idx = Math.max(0, Math.min(i, codeInputs.length - 1));
        codeInputs[idx].focus();
        codeInputs[idx].select?.();
      }

      function maskPhone(phoneDigits) {
        if (phoneDigits.length < 10) return phoneEl.value || "";
        return (
          phoneDigits.slice(0, 2) +
          " " +
          phoneDigits.slice(2, 5) +
          "-" +
          phoneDigits.slice(5, 7) +
          "-" +
          phoneDigits.slice(7, 10)
        );
      }

      function getUserName(phoneDigits) {
        // Требование: "с именем пользователя". У нас нет отдельного поля имени,
        // поэтому "имя" формируем детерминированно по телефону.
        const last4 = phoneDigits.slice(-4);
        return last4 ? "Пользователь " + last4 : "Пользователь";
      }

      function updateNextState() {
        // Требование: "Далее" активна, если номер не пустой.
        const d = digitsOnly(phoneEl.value);
        btnNext.disabled = d.length === 0;
      }

      phoneEl.addEventListener("input", updateNextState);
      updateNextState();

      btnNext.addEventListener("click", () => {
        currentPhoneDigits = digitsOnly(phoneEl.value);
        if (!currentPhoneDigits) return;

        clearCodeInputs();
        setScreen("code");
        focusCodeIndex(0);
      });

      // Ввод/переход между OTP-полями
      codeInputs.forEach((el, idx) => {
        el.addEventListener("input", () => {
          // Поскольку maxlength=1, обычно будет 0/1 цифра,
          // но на всякий случай поддержим ситуацию, когда в поле попало сразу несколько символов.
          const d = digitsOnly(el.value);

          if (d.length === 0) {
            el.value = "";
            checkCodeComplete();
            return;
          }

          // Запишем до 6 цифр, начиная с текущего индекса.
          let writeAt = idx;
          for (let i = 0; i < d.length && writeAt < codeInputs.length; i++) {
            codeInputs[writeAt].value = d[i];
            writeAt++;
          }

          const nextIndex = Math.min(writeAt, codeInputs.length - 1);
          focusCodeIndex(nextIndex);
          checkCodeComplete();
        });

        el.addEventListener("keydown", (e) => {
          if (e.key !== "Backspace") return;

          if (idx === 0) {
            e.preventDefault();
            el.value = "";
            checkCodeComplete();
            return;
          }

          e.preventDefault();
          // Требование: курсор переходит к предыдущему полю.
          // Если в текущем поле была цифра — очистим текущую.
          if (el.value && el.value.length > 0) el.value = "";

          // Не очищаем предыдущее поле автоматически: просто переводим фокус.
          focusCodeIndex(idx - 1);
          checkCodeComplete();
        });
      });

      // Паста: вставляем до 6 цифр сразу.
      codeInputsWrap.addEventListener("paste", (e) => {
        const text = e.clipboardData ? e.clipboardData.getData("text") : "";
        const d = digitsOnly(text).slice(0, 6);
        if (!d) return;

        e.preventDefault();
        clearCodeInputs();

        for (let i = 0; i < d.length; i++) {
          codeInputs[i].value = d[i];
        }

        const lastFilled = Math.min(d.length - 1, codeInputs.length - 1);
        focusCodeIndex(lastFilled);
        checkCodeComplete();
      });

      // Подтверждение
      btnConfirm.addEventListener("click", () => {
        if (!checkCodeComplete()) return;

        const code = getCode();
        if (!/^\d{6}$/.test(code)) return; // дополнительная защита от некорректного состояния

        // "Если код правильный — переходим на главный экран"
        // Проверка кода: подходит любой 6-значный.
        const username = getUserName(currentPhoneDigits);
        welcomeTitle.textContent = "Привет, " + username + "!";

        setScreen("main");
      });

      // Ссылка: возвращает на экран входа
      resendLink.addEventListener("click", () => {
        currentPhoneDigits = digitsOnly(phoneEl.value);
        clearCodeInputs();
        setScreen("enter");
        // Сохраняем номер телефона как есть (UX), но фокусируемся на поле.
        phoneEl.focus();
      });

      // Инициализация состояния при загрузке
      checkCodeComplete();
    </script>
  </body>
</html>
