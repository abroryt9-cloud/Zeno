<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основной контейнер — как окно Telegram */
        .zeno {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 850px;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border-radius: 28px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Хедер как в Telegram */
        .header {
            padding: 14px 20px;
            background: #0f0f0f;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3e6b9e 0%, #2a9b8f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: white;
            letter-spacing: -0.3px;
        }

        .header-icons {
            display: flex;
            gap: 18px;
        }

        .header-icons span {
            font-size: 20px;
            cursor: pointer;
            color: #2a9b8f;
        }

        /* Вкладки как в Telegram */
        .tabs {
            display: flex;
            padding: 8px 16px;
            gap: 20px;
            background: #0f0f0f;
            border-bottom: 1px solid #1f1f1f;
        }

        .tab {
            font-size: 15px;
            font-weight: 500;
            padding-bottom: 8px;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
        }

        .tab.active {
            color: #2a9b8f;
            border-bottom: 2px solid #2a9b8f;
        }

        /* Поиск */
        .search {
            padding: 10px 16px;
            background: #0f0f0f;
        }

        .search input {
            width: 100%;
            padding: 10px 16px;
            background: #1f1f1f;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
        }

        .search input:focus {
            outline: none;
        }

        /* Список чатов */
        .list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 8px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #1a1a1a;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3e6b9e 0%, #2a9b8f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 500;
            color: white;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 500;
            color: white;
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
        }

        /* Экран чата */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #1f1f1f;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #2a9b8f;
            padding: 0;
            width: 36px;
        }

        .chat-header .avatar {
            width: 44px;
            height: 44px;
            font-size: 18px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-size: 17px;
            font-weight: 500;
            color: white;
        }

        .chat-header-status {
            font-size: 12px;
            color: #888;
        }

        /* Сообщения */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0f0f0f;
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-mine {
            background: #2a9b8f;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-theirs {
            background: #1f1f1f;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        /* Ввод сообщения */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            background: #0f0f0f;
            border-top: 1px solid #1f1f1f;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #1f1f1f;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
        }

        .input-area input:focus {
            outline: none;
        }

        .send-btn {
            padding: 12px 20px;
            background: #2a9b8f;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        /* Экран входа */
        .auth {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 32px;
        }

        .auth-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3e6b9e 0%, #2a9b8f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 56px;
            font-weight: bold;
            color: white;
        }

        .auth-title {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }

        .auth input {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            background: #1f1f1f;
            border: none;
            border-radius: 14px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .auth button {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 500;
            background: #2a9b8f;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }

        .code-digits {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
        }

        .code-digit {
            width: 52px;
            height: 64px;
            text-align: center;
            font-size: 28px;
            background: #1f1f1f;
            border: none;
            border-radius: 14px;
            color: white;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="zeno" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="auth">
            <div class="auth-logo">Z</div>
            <div class="auth-title">Zeno</div>
            <div class="auth-subtitle">Твой голос в мире общения</div>
            <input type="tel" id="phoneInput" placeholder="+7 900 000 00 00">
            <button id="nextBtn">Далее</button>
        </div>

        <!-- Экран кода -->
        <div id="codeScreen" class="auth hidden">
            <div class="auth-logo">Z</div>
            <div class="auth-title">Zeno</div>
            <div class="auth-subtitle">Введите код из SMS</div>
            <div id="displayPhone" style="text-align:center; color:#2a9b8f; margin-bottom:16px;"></div>
            <div class="code-digits">
                <input type="text" maxlength="1" class="code-digit" id="code1">
                <input type="text" maxlength="1" class="code-digit" id="code2">
                <input type="text" maxlength="1" class="code-digit" id="code3">
                <input type="text" maxlength="1" class="code-digit" id="code4">
                <input type="text" maxlength="1" class="code-digit" id="code5">
                <input type="text" maxlength="1" class="code-digit" id="code6">
            </div>
            <button id="verifyBtn" disabled>Подтвердить</button>
            <div style="text-align:center; margin-top:20px;">
                <a id="resendBtn" style="color:#2a9b8f; cursor:pointer;">Не пришел код? Отправить снова</a>
            </div>
        </div>

        <!-- Главный экран -->
        <div id="mainScreen" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">Z</div>
                    <div class="logo-text">Zeno</div>
                </div>
                <div class="header-icons">
                    <span>✚</span>
                    <span>⚙️</span>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="chats">Чаты</div>
                <div class="tab" data-tab="contacts">Контакты</div>
            </div>
            <div class="search">
                <input type="text" id="searchInput" placeholder="Поиск">
            </div>
            <div id="chatsView" class="list">
                <div id="chatList"></div>
            </div>
            <div id="contactsView" class="list hidden">
                <div id="contactsList"></div>
            </div>
        </div>

        <!-- Экран чата -->
        <div id="chatScreen" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button id="backBtn" class="back-btn">←</button>
                <div class="avatar" id="chatAvatar">U</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName"></div>
                    <div class="chat-header-status" id="chatStatus"></div>
                </div>
            </div>
            <div class="messages" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение">
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Данные
        let currentUser = null;
        let currentChat = null;
        let messages = {};

        // Пример контактов
        const contacts = [
            { id: "1", name: "Анна", avatar: "А", status: "онлайн" },
            { id: "2", name: "Дмитрий", avatar: "Д", status: "был(а) недавно" },
            { id: "3", name: "Екатерина", avatar: "Е", status: "онлайн" },
            { id: "4", name: "Михаил", avatar: "М", status: "был(а) 2 часа назад" }
        ];

        // Пример сообщений
        messages["1"] = [
            { text: "Привет! Как дела?", time: "12:30", fromMe: false },
            { text: "Привет! Отлично, а у тебя?", time: "12:31", fromMe: true }
        ];
        messages["2"] = [
            { text: "Сегодня встречаемся?", time: "10:15", fromMe: false },
            { text: "Да, во сколько?", time: "10:16", fromMe: true }
        ];

        // Элементы
        const loginScreen = document.getElementById('loginScreen');
        const codeScreen = document.getElementById('codeScreen');
        const mainScreen = document.getElementById('mainScreen');
        const chatScreen = document.getElementById('chatScreen');

        const phoneInput = document.getElementById('phoneInput');
        const nextBtn = document.getElementById('nextBtn');
        const displayPhone = document.getElementById('displayPhone');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const searchInput = document.getElementById('searchInput');

        const chatList = document.getElementById('chatList');
        const contactsList = document.getElementById('contactsList');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const backBtn = document.getElementById('backBtn');

        const chatName = document.getElementById('chatName');
        const chatStatus = document.getElementById('chatStatus');
        const chatAvatar = document.getElementById('chatAvatar');

        const codeInputs = ['code1', 'code2', 'code3', 'code4', 'code5', 'code6'].map(id => document.getElementById(id));

        // Вход
        function checkCodeComplete() {
            const allFilled = codeInputs.every(i => i.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }

        codeInputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && i < 5) codeInputs[i+1].focus();
                checkCodeComplete();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value.length === 0 && i > 0) codeInputs[i-1].focus();
            });
        });

        nextBtn.onclick = () => {
            const phone = phoneInput.value.trim();
            if (phone) {
                displayPhone.textContent = phone;
                loginScreen.classList.add('hidden');
                codeScreen.classList.remove('hidden');
            }
        };

        verifyBtn.onclick = () => {
            const code = codeInputs.map(i => i.value).join('');
            if (code.length === 6) {
                codeScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                renderChats();
                renderContacts();
            }
        };

        resendBtn.onclick = () => {
            codeInputs.forEach(i => i.value = '');
            verifyBtn.disabled = true;
            codeInputs[0].focus();
        };

        // Отображение чатов
        function renderChats() {
            chatList.innerHTML = '';
            const search = searchInput.value.toLowerCase();
            contacts.filter(c => c.name.toLowerCase().includes(search)).forEach(contact => {
                const lastMsg = messages[contact.id]?.[messages[contact.id].length-1]?.text || "Нет сообщений";
                const time = messages[contact.id]?.[messages[contact.id].length-1]?.time || "";
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="avatar">${contact.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${contact.name}</div>
                        <div class="chat-preview">${lastMsg}</div>
                    </div>
                    <div class="chat-time">${time}</div>
                `;
                div.onclick = () => openChat(contact);
                chatList.appendChild(div);
            });
        }

        // Отображение контактов
        function renderContacts() {
            contactsList.innerHTML = '';
            const search = searchInput.value.toLowerCase();
            contacts.filter(c => c.name.toLowerCase().includes(search)).forEach(contact => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="avatar">${contact.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${contact.name}</div>
                        <div class="chat-preview">${contact.status}</div>
                    </div>
                `;
                div.onclick = () => openChat(contact);
                contactsList.appendChild(div);
            });
        }

        // Поиск
        searchInput.addEventListener('input', () => {
            renderChats();
            renderContacts();
        });

        // Открыть чат
        function openChat(contact) {
            currentChat = contact;
            chatName.textContent = contact.name;
            chatStatus.textContent = contact.status;
            chatAvatar.textContent = contact.avatar;
            renderMessages();
            mainScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
        }

        // Отображение сообщений
        function renderMessages() {
            messagesArea.innerHTML = '';
            const msgs = messages[currentChat.id] || [];
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromMe ? 'message-mine' : 'message-theirs'}`;
                div.innerHTML = `${msg.text}<div class="message-time">${msg.time}</div>`;
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Отправить сообщение
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChat) return;

            if (!messages[currentChat.id]) messages[currentChat.id] = [];
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messages[currentChat.id].push({ text, time, fromMe: true });
            renderMessages();
            messageInput.value = '';
            renderChats();

            // Автоответ
            setTimeout(() => {
                if (!messages[currentChat.id]) messages[currentChat.id] = [];
                messages[currentChat.id].push({ text: "Спасибо! 😊", time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }), fromMe: false });
                renderMessages();
                renderChats();
            }, 1000);
        }

        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        backBtn.onclick = () => {
            chatScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
        };

        // Табы
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'chats') {
                    document.getElementById('chatsView').classList.remove('hidden');
                    document.getElementById('contactsView').classList.add('hidden');
                    renderChats();
                } else {
                    document.getElementById('chatsView').classList.add('hidden');
                    document.getElementById('contactsView').classList.remove('hidden');
                    renderContacts();
                }
            };
        });
    </script>
</body>
</html>
