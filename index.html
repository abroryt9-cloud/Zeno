<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeno Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .card {
            background: #1E1E1E;
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        /* Хедер */
        .header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid #2C2C2E;
        }
        
        .logo-small {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-circle {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Табы */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid #2C2C2E;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #2C2C2E;
            border-radius: 14px;
            cursor: pointer;
            color: #8E8E93;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #2AABEE;
            color: white;
        }
        
        /* Списки */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        
        .chat-item, .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #2C2C2E;
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover, .contact-item:hover {
            background: #3A3A3C;
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }
        
        .chat-preview {
            font-size: 13px;
            color: #8E8E93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            font-size: 11px;
            color: #8E8E93;
            flex-shrink: 0;
        }
        
        /* Чат */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid #2C2C2E;
            background: #1E1E1E;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #2AABEE;
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-header .avatar {
            width: 44px;
            height: 44px;
            font-size: 18px;
        }
        
        .chat-header-name {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0F0F0F;
        }
        
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message-mine {
            background: #2AABEE;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-theirs {
            background: #2C2C2E;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: #1E1E1E;
            border-top: 1px solid #2C2C2E;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2C2C2E;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 16px;
        }
        
        .message-input:focus {
            outline: none;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: #2AABEE;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Экран входа */
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px;
        }
        
        .auth-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 56px;
            font-weight: bold;
            color: white;
        }
        
        .auth-title {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .auth-subtitle {
            text-align: center;
            color: #8E8E93;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .auth-input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .auth-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #2AABEE;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .code-digits {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
        }
        
        .code-digit {
            width: 52px;
            height: 64px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
        }
        
        .code-digit:focus {
            outline: none;
            border-color: #2AABEE;
        }
        
        .phone-number {
            text-align: center;
            color: #2AABEE;
            margin-bottom: 16px;
        }
        
        .resend-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .resend-link a {
            color: #2AABEE;
            text-decoration: none;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="auth-container">
            <div class="auth-logo">Z</div>
            <div class="auth-title">ZENO</div>
            <div class="auth-subtitle">Мессенджер будущего</div>
            <input type="tel" id="phoneInput" class="auth-input" placeholder="+7 900 000 00 00">
            <button id="nextBtn" class="auth-btn">Далее</button>
        </div>
        
        <!-- Экран кода -->
        <div id="codeScreen" class="auth-container hidden">
            <div class="auth-logo">Z</div>
            <div class="auth-title">ZENO</div>
            <div class="auth-subtitle">Введите код из SMS</div>
            <div class="phone-number" id="displayPhone"></div>
            <div class="code-digits">
                <input type="text" maxlength="1" class="code-digit" id="code1">
                <input type="text" maxlength="1" class="code-digit" id="code2">
                <input type="text" maxlength="1" class="code-digit" id="code3">
                <input type="text" maxlength="1" class="code-digit" id="code4">
                <input type="text" maxlength="1" class="code-digit" id="code5">
                <input type="text" maxlength="1" class="code-digit" id="code6">
            </div>
            <button id="verifyBtn" class="auth-btn" disabled>Подтвердить</button>
            <div class="resend-link">
                <a id="resendBtn">Не пришел код? Отправить снова</a>
            </div>
        </div>
        
        <!-- Главный экран (списки) -->
        <div id="mainScreen" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="header">
                <div class="logo-small">
                    <div class="logo-circle">Z</div>
                    <div class="logo-text">Zeno</div>
                </div>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="chats">Чаты</div>
                <div class="tab" data-tab="contacts">Контакты</div>
            </div>
            <div id="chatsView" class="list-container">
                <div id="chatList"></div>
            </div>
            <div id="contactsView" class="list-container hidden">
                <div id="contactsList"></div>
            </div>
        </div>
        
        <!-- Экран чата -->
        <div id="chatScreen" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button id="backToMainBtn" class="back-btn">←</button>
                <div class="avatar" id="chatAvatar">U</div>
                <div class="chat-header-name" id="chatUserName"></div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение">
                <button id="sendBtn" class="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let currentChatUser = null;
        let messages = {}; // { "userId": [{text, time, fromMe}] }
        
        // Список контактов (пользователи)
        const users = [
            { id: "user1", name: "Анна", avatar: "А", phone: "+7 900 111 22 33", status: "online" },
            { id: "user2", name: "Дмитрий", avatar: "Д", phone: "+7 900 444 55 66", status: "был(а) 5 мин назад" },
            { id: "user3", name: "Екатерина", avatar: "Е", phone: "+7 900 777 88 99", status: "online" },
            { id: "user4", name: "Михаил", avatar: "М", phone: "+7 900 999 00 11", status: "был(а) 2 часа назад" },
            { id: "user5", name: "Ольга", avatar: "О", phone: "+7 901 222 33 44", status: "online" }
        ];
        
        // Загрузка сообщений из localStorage
        if (!localStorage.getItem('zeno_messages')) {
            // Добавляем примеры сообщений
            messages = {
                "user1": [
                    { text: "Привет! Как дела?", time: "12:30", fromMe: false },
                    { text: "Привет! Отлично, а у тебя?", time: "12:31", fromMe: true }
                ],
                "user2": [
                    { text: "Сегодня встречаемся?", time: "10:15", fromMe: false },
                    { text: "Да, во сколько?", time: "10:16", fromMe: true }
                ]
            };
            localStorage.setItem('zeno_messages', JSON.stringify(messages));
        } else {
            messages = JSON.parse(localStorage.getItem('zeno_messages'));
        }
        
        // Сохранение сообщений
        function saveMessages() {
            localStorage.setItem('zeno_messages', JSON.stringify(messages));
        }
        
        // ========== ЭЛЕМЕНТЫ ==========
        const loginScreen = document.getElementById('loginScreen');
        const codeScreen = document.getElementById('codeScreen');
        const mainScreen = document.getElementById('mainScreen');
        const chatScreen = document.getElementById('chatScreen');
        
        const phoneInput = document.getElementById('phoneInput');
        const nextBtn = document.getElementById('nextBtn');
        const displayPhone = document.getElementById('displayPhone');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        
        const chatsView = document.getElementById('chatsView');
        const contactsView = document.getElementById('contactsView');
        const chatList = document.getElementById('chatList');
        const contactsList = document.getElementById('contactsList');
        
        const chatUserName = document.getElementById('chatUserName');
        const chatAvatar = document.getElementById('chatAvatar');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const backToMainBtn = document.getElementById('backToMainBtn');
        
        // Поля кода
        const codeInputs = ['code1', 'code2', 'code3', 'code4', 'code5', 'code6'].map(id => document.getElementById(id));
        
        // ========== ФУНКЦИИ ВХОДА ==========
        function checkCodeComplete() {
            const allFilled = codeInputs.every(input => input.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }
        
        for (let i = 0; i < codeInputs.length; i++) {
            codeInputs[i].addEventListener('input', function() {
                if (this.value.length === 1 && i < codeInputs.length - 1) {
                    codeInputs[i + 1].focus();
                }
                checkCodeComplete();
            });
            codeInputs[i].addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && i > 0) {
                    codeInputs[i - 1].focus();
                }
            });
        }
        
        nextBtn.onclick = () => {
            const phone = phoneInput.value.trim();
            if (phone.length > 5) {
                currentUser = { id: "current", name: phone, avatar: "Я" };
                displayPhone.textContent = phone;
                loginScreen.classList.add('hidden');
                codeScreen.classList.remove('hidden');
            } else {
                alert('Введите номер телефона');
            }
        };
        
        verifyBtn.onclick = () => {
            const code = codeInputs.map(i => i.value).join('');
            if (code.length === 6) {
                codeScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                renderChatList();
                renderContactsList();
            }
        };
        
        resendBtn.onclick = () => {
            codeInputs.forEach(input => input.value = '');
            verifyBtn.disabled = true;
            codeInputs[0].focus();
            alert('Демо-режим: код 123456');
        };
        
        // ========== ОТОБРАЖЕНИЕ СПИСКОВ ==========
        function getLastMessage(userId) {
            const userMessages = messages[userId];
            if (userMessages && userMessages.length > 0) {
                const last = userMessages[userMessages.length - 1];
                return last.text.substring(0, 40);
            }
            return "Нет сообщений";
        }
        
        function getLastMessageTime(userId) {
            const userMessages = messages[userId];
            if (userMessages && userMessages.length > 0) {
                return userMessages[userMessages.length - 1].time;
            }
            return "";
        }
        
        function renderChatList() {
            chatList.innerHTML = '';
            users.forEach(user => {
                const lastMsg = getLastMessage(user.id);
                const lastTime = getLastMessageTime(user.id);
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="avatar">${user.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.name}</div>
                        <div class="chat-preview">${lastMsg}</div>
                    </div>
                    <div class="chat-time">${lastTime}</div>
                `;
                div.onclick = () => openChat(user);
                chatList.appendChild(div);
            });
        }
        
        function renderContactsList() {
            contactsList.innerHTML = '';
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <div class="avatar">${user.avatar}</div>
                    <div class="chat-info">
                        <div class="chat-name">${user.name}</div>
                        <div class="chat-preview">${user.status}</div>
                    </div>
                `;
                div.onclick = () => openChat(user);
                contactsList.appendChild(div);
            });
        }
        
        // ========== ЧАТ ==========
        function renderMessages() {
            if (!currentChatUser) return;
            const chatId = currentChatUser.id;
            const chatMessages = messages[chatId] || [];
            
            messagesArea.innerHTML = '';
            chatMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromMe ? 'message-mine' : 'message-theirs'}`;
                div.innerHTML = `${msg.text}<div class="message-time">${msg.time}</div>`;
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function addMessage(text, fromMe, userId = null) {
            const targetId = userId || currentChatUser.id;
            if (!messages[targetId]) messages[targetId] = [];
            
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messages[targetId].push({
                text: text,
                time: time,
                fromMe: fromMe
            });
            
            saveMessages();
            
            if (currentChatUser && currentChatUser.id === targetId) {
                renderMessages();
            }
            renderChatList();
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChatUser) return;
            
            addMessage(text, true);
            messageInput.value = '';
            
            // Автоответ через 1 секунду (демо)
            setTimeout(() => {
                const responses = [
                    "Понял!",
                    "Хорошо, спасибо!",
                    "Отлично!",
                    "Спасибо за сообщение!",
                    "Я скоро отвечу"
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage(randomResponse, false);
            }, 1000);
        }
        
        function openChat(user) {
            currentChatUser = user;
            chatUserName.textContent = user.name;
            chatAvatar.textContent = user.avatar;
            mainScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            renderMessages();
        }
        
        // ========== ТАБЫ ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'chats') {
                    chatsView.classList.remove('hidden');
                    contactsView.classList.add('hidden');
                } else {
                    chatsView.classList.add('hidden');
                    contactsView.classList.remove('hidden');
                }
            };
        });
        
        backToMainBtn.onclick = () => {
            chatScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            currentChatUser = null;
        };
        
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
