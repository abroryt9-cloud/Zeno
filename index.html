<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeno</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --card: #1e1e1e;
        --accent: #2aabee;
        --text: #ffffff;
        --muted: #8e8e93;
        --border: rgba(255, 255, 255, 0.08);
        --bubble-me: #2aabee;
        --bubble-them: #2b2b2b;
        --composer-bg: #0f0f0f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }

      .app {
        width: 100%;
        max-width: 980px;
        height: min(100vh - 24px, 860px);
      }

      .shell {
        height: 100%;
        border-radius: 18px;
        overflow: hidden;
        background: var(--card);
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .screen {
        display: none;
        height: 100%;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
      }

      /* AUTH */
      .auth {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 22px;
      }

      .logoTitle {
        margin: 0;
        font-size: 32px;
        font-weight: 950;
        letter-spacing: 0.14em;
        text-align: center;
      }

      .authSub {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .formCard {
        width: min(440px, 100%);
        margin-top: 18px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid var(--border);
        padding: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .input {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        padding: 0 14px;
        font-size: 15px;
        color: var(--text);
        outline: none;
      }

      .input:focus {
        border-color: rgba(42, 171, 238, 0.55);
        box-shadow: 0 0 0 5px rgba(42, 171, 238, 0.15);
      }

      .btn {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        font-weight: 900;
        font-size: 15px;
        background: var(--accent);
        color: #041018;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:disabled {
        opacity: 0.48;
        background: rgba(42, 171, 238, 0.35);
        cursor: not-allowed;
        color: var(--text);
      }

      .btnRow {
        margin-top: 12px;
      }

      .hint {
        margin-top: 10px;
        text-align: center;
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.25;
      }

      .error {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 77, 79, 0.35);
        background: rgba(255, 77, 79, 0.12);
        color: rgba(255, 255, 255, 0.95);
        font-size: 13px;
        display: none;
      }
      .error.active {
        display: block;
      }

      /* OTP */
      .codeRow {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
        margin-bottom: 12px;
      }

      .codeInput {
        width: 50px;
        height: 60px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        text-align: center;
        font-size: 20px;
        font-weight: 800;
        outline: none;
      }

      .codeInput:focus {
        border-color: rgba(42, 171, 238, 0.55);
        box-shadow: 0 0 0 5px rgba(42, 171, 238, 0.15);
      }

      .resend {
        margin-top: 12px;
        text-align: center;
      }

      .linkBtn {
        border: none;
        background: none;
        color: rgba(42, 171, 238, 0.95);
        font-weight: 800;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      /* CHAT */
      .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .topBar {
        height: 64px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 14px;
        border-bottom: 1px solid var(--border);
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(42, 171, 238, 0.95), rgba(124, 58, 237, 0.55));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 950;
        color: #041018;
      }

      .topMeta {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .userName {
        font-weight: 950;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .userSub {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chatBody {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .sidebar {
        width: 280px;
        border-right: 1px solid var(--border);
        padding: 10px;
        overflow-y: auto;
      }

      .sidebarTitle {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        margin: 4px 6px 10px 6px;
      }

      .chatItem {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 10px;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 6px;
      }

      .chatItem:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .chatItem.active {
        border-color: rgba(42, 171, 238, 0.35);
        background: rgba(42, 171, 238, 0.08);
      }

      .chatItemName {
        font-weight: 950;
        font-size: 14px;
      }

      .chatItemPreview {
        color: var(--muted);
        font-size: 12.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .conversation {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .messages {
        flex: 1;
        padding: 14px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.08);
      }

      .msgRow {
        display: flex;
        margin: 8px 0;
      }

      .msgRow.me {
        justify-content: flex-end;
      }

      .msgRow.them {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 76%;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--border);
        font-size: 14px;
        line-height: 1.25;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.me {
        background: rgba(42, 171, 238, 0.95);
        border-color: rgba(42, 171, 238, 0.35);
        color: #041018;
      }

      .bubble.them {
        background: rgba(30, 30, 30, 0.95);
        border-color: var(--border);
        color: var(--text);
      }

      .composer {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: rgba(0, 0, 0, 0.15);
      }

      .composerInput {
        flex: 1;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.45);
        color: var(--text);
        padding: 12px 12px;
        font-size: 14px;
        outline: none;
        resize: none;
        min-height: 46px;
        max-height: 120px;
      }

      .sendBtn {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #041018;
        font-weight: 950;
        flex-shrink: 0;
      }

      .sendBtn:active {
        transform: translateY(1px);
      }

      /* Responsive */
      @media (max-width: 720px) {
        .app {
          max-width: 100%;
          height: 100vh;
          border-radius: 0;
        }
        body {
          padding: 0;
        }
        .shell {
          border-radius: 0;
        }
        .sidebar {
          width: 240px;
        }
      }

      @media (max-width: 520px) {
        .chatBody {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border);
          display: flex;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 10px;
          gap: 8px;
        }
        .sidebarTitle {
          display: none;
        }
        .chatItem {
          min-width: 180px;
          margin-bottom: 0;
        }
        .bubble {
          max-width: 88%;
        }
      }

      /* Узкие: OTP-шапка */
      @media (max-width: 420px) {
        .codeRow {
          gap: 6px;
        }
      }
    </style>

    <!-- Firebase (Client-only for GitHub Pages) -->
    <script
      src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"
      defer
    ></script>
  </head>

  <body>
    <div class="app">
      <div class="shell">
        <!-- recaptcha container -->
        <div id="recaptcha-container" style="display: none"></div>

        <!-- AUTH SCREEN: PHONE -->
        <section class="screen active" id="screen-enter">
          <div class="auth">
            <h1 class="logoTitle">ZENO</h1>
            <div class="authSub" id="enterSubtitle">Вход по номеру телефона</div>

            <div class="formCard">
              <label for="phone">Номер телефона</label>
              <input
                class="input"
                id="phone"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+7 999 123-45-67"
              />

              <div class="btnRow">
                <button class="btn" id="btnNext" type="button" disabled>Далее</button>
              </div>

              <div class="hint">Мы отправим SMS с кодом подтверждения.</div>
              <div class="error" id="authError"></div>
            </div>
          </div>
        </section>

        <!-- AUTH SCREEN: CODE -->
        <section class="screen" id="screen-code">
          <div class="auth">
            <h1 class="logoTitle">ZENO</h1>
            <div class="authSub">Введите код из SMS</div>

            <div class="formCard">
              <label for="codeInputs">Код подтверждения</label>

              <div class="codeRow" id="codeInputsWrap" aria-label="Введите 6-значный код">
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
              </div>

              <div class="btnRow">
                <button class="btn" id="btnConfirm" type="button" disabled>Подтвердить</button>
              </div>

              <div class="resend">
                <button class="linkBtn" id="resendLink" type="button">
                  Не пришел код? Отправить снова
                </button>
              </div>
              <div class="error" id="authErrorCode"></div>
            </div>
          </div>
        </section>

        <!-- CHAT SCREEN -->
        <section class="screen" id="screen-main">
          <div class="chat">
            <div class="topBar">
              <div class="avatar" id="avatar">U</div>
              <div class="topMeta">
                <div class="userName" id="userName">Пользователь</div>
                <div class="userSub" id="userSub">Zeno • Чаты</div>
              </div>
            </div>

            <div class="chatBody">
              <aside class="sidebar" id="chatList" aria-label="Список чатов"></aside>

              <div class="conversation">
                <div class="messages" id="messages" aria-label="Сообщения"></div>

                <div class="composer">
                  <textarea
                    class="composerInput"
                    id="messageInput"
                    rows="1"
                    placeholder="Сообщение…"
                  ></textarea>
                  <button class="sendBtn" id="sendBtn" type="button" aria-label="Отправить">
                    ↗
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      // Required by user: Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyCgb60YBJ9CtE0jz7Z7nKG5V2-NpTaF5yw",
        authDomain: "zeno-offisal.firebaseapp.com",
        projectId: "zeno-offisal",
        storageBucket: "zeno-offisal.firebasestorage.app",
        messagingSenderId: "280179393071",
        appId: "1:280179393071:web:227a3806f74cd59e04fcda",
        measurementId: "G-F0WQ9FDGGN",
      };

      // Wait for Firebase scripts
      function ensureFirebase() {
        if (!window.firebase) return false;
        if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
        return true;
      }

      const waitForFirebase = new Promise((resolve) => {
        const start = Date.now();
        const timer = setInterval(() => {
          if (ensureFirebase()) {
            clearInterval(timer);
            resolve();
            return;
          }
          if (Date.now() - start > 15000) {
            clearInterval(timer);
            resolve();
          }
        }, 100);
      });

      waitForFirebase.then(() => {
        if (!window.firebase) {
          // eslint-disable-next-line no-alert
          alert("Firebase SDK не загрузился. Проверьте доступ к https://www.gstatic.com.");
          return;
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- DOM ---
        const phoneEl = document.getElementById("phone");
        const btnNext = document.getElementById("btnNext");

        const screenEnter = document.getElementById("screen-enter");
        const screenCode = document.getElementById("screen-code");
        const screenMain = document.getElementById("screen-main");

        const btnConfirm = document.getElementById("btnConfirm");
        const resendLink = document.getElementById("resendLink");

        const codeInputsWrap = document.getElementById("codeInputsWrap");
        const codeInputs = Array.from(codeInputsWrap.querySelectorAll("input.codeInput"));

        const authErrorEnter = document.getElementById("authError");
        const authErrorCode = document.getElementById("authErrorCode");

        const avatarEl = document.getElementById("avatar");
        const userNameEl = document.getElementById("userName");
        const userSubEl = document.getElementById("userSub");

        const chatListEl = document.getElementById("chatList");
        const messagesEl = document.getElementById("messages");
        const messageInputEl = document.getElementById("messageInput");
        const sendBtnEl = document.getElementById("sendBtn");

        const recaptchaContainer = document.getElementById("recaptcha-container");

        // --- State ---
        let verificationId = null;
        let loginPhoneE164 = "";
        let currentPhoneE164 = "";
        let selectedConversationId = null;

        // Firestore listeners to unsubscribe
        let unsubConversations = null;
        let unsubMessages = null;

        const SUPPORT_PHONE = "support";
        const SUPPORT_NAME = "Поддержка";

        // --- UI Helpers ---
        function setScreen(which) {
          screenEnter.classList.remove("active");
          screenCode.classList.remove("active");
          screenMain.classList.remove("active");

          if (which === "enter") screenEnter.classList.add("active");
          if (which === "code") screenCode.classList.add("active");
          if (which === "main") screenMain.classList.add("active");
        }

        function showError(el, text) {
          if (!el) return;
          el.textContent = text || "Ошибка";
          el.classList.add("active");
        }

        function clearError(el) {
          if (!el) return;
          el.textContent = "";
          el.classList.remove("active");
        }

        // --- OTP Logic ---
        function digitsOnly(s) {
          return String(s || "").replace(/\D/g, "");
        }

        function checkCodeComplete() {
          // Кнопка активна ТОЛЬКО при заполненных 6 полях (в цифрах).
          const code = codeInputs.map((el) => el.value).join("");
          const ok = /^\d{6}$/.test(code);
          btnConfirm.disabled = !ok;
          return ok;
        }

        function getCode() {
          return codeInputs.map((el) => el.value).join("");
        }

        function clearCodeInputs() {
          codeInputs.forEach((el) => (el.value = ""));
          btnConfirm.disabled = true;
        }

        function focusCodeIndex(i) {
          const idx = Math.max(0, Math.min(i, codeInputs.length - 1));
          codeInputs[idx].focus();
          codeInputs[idx].select?.();
        }

        phoneEl.addEventListener("input", () => {
          const d = digitsOnly(phoneEl.value);
          btnNext.disabled = d.length === 0;
          clearError(authErrorEnter);
        });
        btnNext.disabled = true;

        // Convert digits to a consistent E.164-ish format (+7...).
        function toE164FromDigits(digits) {
          if (!digits) return "";
          if (digits.length === 11 && digits.startsWith("7")) return "+" + digits;
          if (digits.length === 10) return "+7" + digits;
          // Fallback: keep as +digits if possible
          return digits.startsWith("+") ? digits : "+" + digits;
        }

        function getVerifier() {
          if (window.recaptchaVerifier && typeof window.recaptchaVerifier.clear === "function") {
            try {
              window.recaptchaVerifier.clear();
            } catch (_) {}
          }
          window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
            recaptchaContainer,
            { size: "invisible" },
            auth
          );
          return window.recaptchaVerifier;
        }

        btnNext.addEventListener("click", async () => {
          clearError(authErrorEnter);
          clearError(authErrorCode);

          const digits = digitsOnly(phoneEl.value);
          if (!digits) return;

          loginPhoneE164 = toE164FromDigits(digits);
          currentPhoneE164 = loginPhoneE164;

          verificationId = null;
          clearCodeInputs();
          setScreen("code");

          try {
            const appVerifier = getVerifier();
            const phoneProvider = new firebase.auth.PhoneAuthProvider();
            const result = await phoneProvider.verifyPhoneNumber(
              loginPhoneE164,
              appVerifier
            );
            // With compat, verifyPhoneNumber returns verificationId as string
            verificationId = result;
            focusCodeIndex(0);
          } catch (e) {
            verificationId = null;
            showError(authErrorCode, e?.message || "Не удалось отправить код. Проверьте настройки Firebase.");
          }
        });

        resendLink.addEventListener("click", async () => {
          clearError(authErrorCode);
          if (!loginPhoneE164) return;

          verificationId = null;
          clearCodeInputs();
          try {
            const appVerifier = getVerifier();
            const phoneProvider = new firebase.auth.PhoneAuthProvider();
            const result = await phoneProvider.verifyPhoneNumber(
              loginPhoneE164,
              appVerifier
            );
            verificationId = result;
            focusCodeIndex(0);
          } catch (e) {
            showError(authErrorCode, e?.message || "Не удалось отправить код повторно.");
          }
        });

        codeInputs.forEach((el, idx) => {
          el.addEventListener("input", () => {
            const d = digitsOnly(el.value);
            if (!d) {
              el.value = "";
              checkCodeComplete();
              return;
            }

            // When multiple digits somehow land into one input: fill sequentially.
            let writeAt = idx;
            for (let i = 0; i < d.length && writeAt < codeInputs.length; i++) {
              codeInputs[writeAt].value = d[i];
              writeAt++;
            }

            focusCodeIndex(Math.min(writeAt, codeInputs.length - 1));
            checkCodeComplete();
          });

          el.addEventListener("keydown", (e) => {
            if (e.key !== "Backspace") return;

            e.preventDefault();

            // Requirement: cursor to previous field.
            if (idx > 0) {
              el.value = "";
              focusCodeIndex(idx - 1);
            } else {
              el.value = "";
            }
            checkCodeComplete();
          });
        });

        codeInputsWrap.addEventListener("paste", (e) => {
          const text = e.clipboardData ? e.clipboardData.getData("text") : "";
          const d = digitsOnly(text).slice(0, 6);
          if (!d) return;
          e.preventDefault();

          clearCodeInputs();
          for (let i = 0; i < d.length; i++) codeInputs[i].value = d[i];

          focusCodeIndex(Math.min(d.length - 1, 5));
          checkCodeComplete();
        });

        btnConfirm.addEventListener("click", async () => {
          clearError(authErrorCode);

          if (!checkCodeComplete()) return;
          if (!verificationId) {
            showError(authErrorCode, "Сессия подтверждения устарела. Отправьте код снова.");
            return;
          }

          const code = getCode();
          if (!/^\d{6}$/.test(code)) return;

          try {
            const credential = firebase.auth.PhoneAuthProvider.credential(
              verificationId,
              code
            );

            await auth.signInWithCredential(credential);

            // Success -> build chat UI from Firestore
            const user = auth.currentUser;
            currentPhoneE164 = user?.phoneNumber || currentPhoneE164;

            const userName = getUserNameFromPhone(currentPhoneE164);
            avatarEl.textContent = getAvatarLetter(userName);
            userNameEl.textContent = userName;
            userSubEl.textContent = "Zeno • Чаты";

            await ensureSupportConversationAndOpen();
            setTimeout(() => messageInputEl.focus(), 0);
          } catch (e) {
            showError(authErrorCode, e?.message || "Не удалось подтвердить код.");
          }
        });

        // --- Chat/Firestore ---
        function getUserNameFromPhone(phoneE164) {
          // Имя пользователя из телефона (демо-подход).
          const digits = digitsOnly(phoneE164);
          const last4 = digits.slice(-4);
          return last4 ? "Пользователь " + last4 : "Пользователь";
        }

        function getAvatarLetter(name) {
          const n = String(name || "U").trim();
          return n ? n[0].toUpperCase() : "U";
        }

        function conversationIdForPhones(a, b) {
          const x = String(a || "").trim();
          const y = String(b || "").trim();
          const pair = [x, y].sort();
          return "c_" + pair[0] + "_" + pair[1];
        }

        function ensureSupportConversationId() {
          return conversationIdForPhones(currentPhoneE164, SUPPORT_PHONE);
        }

        async function ensureSupportConversationAndOpen() {
          // Create support conversation if it doesn't exist yet for this user
          const convId = ensureSupportConversationId();
          selectedConversationId = convId;

          const convRef = db.collection("conversations").doc(convId);
          const doc = await convRef.get();
          if (!doc.exists) {
            await convRef.set({
              participants: [currentPhoneE164, SUPPORT_PHONE],
              title: SUPPORT_NAME,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            // Seed with a welcome message if empty
            const messagesSnap = await convRef.collection("messages").limit(1).get();
            if (messagesSnap.empty) {
              await convRef.collection("messages").add({
                from: SUPPORT_PHONE,
                text: "Привет! Я поддержка Zeno. Напиши сообщение ниже.",
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            }
          }

          // Subscribe chat list (conversations)
          subscribeToConversations();
          subscribeToMessages(selectedConversationId);
          renderInitialChatList();
        }

        function renderInitialChatList() {
          const convId = ensureSupportConversationId();
          chatListEl.innerHTML = `
            <div class="sidebarTitle">Чаты</div>
            <button class="chatItem active" type="button" data-conv-id="${convId}">
              <div class="chatItemName">${SUPPORT_NAME}</div>
              <div class="chatItemPreview">Поддержка в сети…</div>
            </button>
          `;
          chatListEl.querySelectorAll(".chatItem").forEach((btn) => {
            btn.addEventListener("click", () => {
              selectedConversationId = btn.getAttribute("data-conv-id");
              subscribeToMessages(selectedConversationId);
              renderChatListActive(selectedConversationId);
            });
          });
        }

        function renderChatListActive(convId) {
          chatListEl.querySelectorAll(".chatItem").forEach((btn) => {
            btn.classList.toggle("active", btn.getAttribute("data-conv-id") === convId);
          });
        }

        function subscribeToConversations() {
          if (unsubConversations) unsubConversations();

          unsubConversations = db
            .collection("conversations")
            .where("participants", "array-contains", currentPhoneE164)
            .onSnapshot(async (snap) => {
              const convDocs = snap.docs;
              if (!convDocs.length) return;

              // Ensure selected conversation exists
              if (!selectedConversationId) {
                selectedConversationId = convDocs[0].id;
              }

              const html = [];
              html.push(`<div class="sidebarTitle">Чаты</div>`);

              for (const doc of convDocs) {
                const data = doc.data() || {};
                const title = data.title || "Чат";
                const convId = doc.id;

                // Preview text: from lastMessageText if stored, else fallback.
                const preview = data.lastMessageText || "Сообщений пока нет";
                const active = convId === selectedConversationId ? "active" : "";

                html.push(`
                  <button class="chatItem ${active}" type="button" data-conv-id="${convId}">
                    <div class="chatItemName">${escapeHtml(title)}</div>
                    <div class="chatItemPreview">${escapeHtml(preview)}</div>
                  </button>
                `);
              }

              chatListEl.innerHTML = html.join("");
              chatListEl.querySelectorAll(".chatItem").forEach((btn) => {
                btn.addEventListener("click", () => {
                  selectedConversationId = btn.getAttribute("data-conv-id");
                  subscribeToMessages(selectedConversationId);
                  renderChatListActive(selectedConversationId);
                });
              });
            });
        }

        function subscribeToMessages(conversationId) {
          if (!conversationId) return;
          if (unsubMessages) unsubMessages();

          unsubMessages = db
            .collection("conversations")
            .doc(conversationId)
            .collection("messages")
            .orderBy("createdAt")
            .limit(100)
            .onSnapshot((snap) => {
              const items = snap.docs.map((d) => d.data());
              renderMessages(items, conversationId);
            });
        }

        function renderMessages(messages, conversationId) {
          messagesEl.innerHTML = "";
          if (!messages || !messages.length) {
            const empty = document.createElement("div");
            empty.style.color = "var(--muted)";
            empty.style.padding = "20px 0";
            empty.textContent = "Сообщений пока нет";
            messagesEl.appendChild(empty);
            return;
          }

          for (const m of messages) {
            const from = m.from || "";
            const text = String(m.text || "");
            const isMe = from === currentPhoneE164;

            const row = document.createElement("div");
            row.className = "msgRow " + (isMe ? "me" : "them");

            const bubble = document.createElement("div");
            bubble.className = "bubble " + (isMe ? "me" : "them");
            bubble.textContent = text;

            row.appendChild(bubble);
            messagesEl.appendChild(row);
          }

          // scroll to bottom
          requestAnimationFrame(() => {
            messagesEl.scrollTop = messagesEl.scrollHeight;
          });
        }

        function escapeHtml(s) {
          return String(s || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function autosizeTextarea(el) {
          el.style.height = "auto";
          el.style.height = el.scrollHeight + "px";
        }

        function sendMessage() {
          if (!selectedConversationId) return;
          const chatRef = db.collection("conversations").doc(selectedConversationId);

          const text = String(messageInputEl.value || "").trim();
          if (!text) return;

          messageInputEl.value = "";
          autosizeTextarea(messageInputEl);

          const createdAt = firebase.firestore.FieldValue.serverTimestamp();

          // Write message
          chatRef
            .collection("messages")
            .add({ from: currentPhoneE164, text, createdAt })
            .then(async () => {
              await chatRef.set(
                {
                  updatedAt: createdAt,
                  lastMessageText: text,
                },
                { merge: true }
              );

              // Demo auto-reply from support to make "real-time messenger" usable
              setTimeout(async () => {
                const replyText = pickReply();
                await chatRef.collection("messages").add({
                  from: SUPPORT_PHONE,
                  text: replyText,
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
                await chatRef.set(
                  {
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageText: replyText,
                  },
                  { merge: true }
                );
              }, 600);
            })
            .catch((e) => {
              showError(authErrorCode, e?.message || "Не удалось отправить сообщение.");
            });
        }

        function pickReply() {
          const replies = [
            "Понял. Продолжай!",
            "Сообщение получено.",
            "Ок, давай дальше.",
            "Класс, работает.",
            "Напиши ещё что-нибудь.",
          ];
          return replies[Math.floor(Math.random() * replies.length)];
        }

        messageInputEl.addEventListener("input", () => autosizeTextarea(messageInputEl));
        sendBtnEl.addEventListener("click", sendMessage);
        messageInputEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
      });
    </script>
  </body>
</html>
