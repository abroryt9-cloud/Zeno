<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeno Messenger</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .card {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 40px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #8E8E93;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1E1E1E;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: opacity 0.2s;
        }
        
        .google-btn:hover {
            opacity: 0.9;
        }
        
        .user-info {
            margin-top: 20px;
            padding: 16px;
            background: #2C2C2E;
            border-radius: 16px;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 12px;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .user-email {
            font-size: 14px;
            color: #8E8E93;
            margin-top: 4px;
        }
        
        .logout-btn {
            margin-top: 16px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #2AABEE;
            color: #2AABEE;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div class="logo">Z</div>
        <h1>ZENO</h1>
        <div class="subtitle">Мессенджер будущего</div>
        
        <!-- Экран входа -->
        <div id="loginScreen">
            <button class="google-btn" id="googleLogin">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Войти через Google
            </button>
        </div>
        
        <!-- Профиль после входа -->
        <div id="profileScreen" class="hidden">
            <div class="user-info">
                <img id="userAvatar" class="avatar" src="" alt="">
                <div id="userName" class="user-name"></div>
                <div id="userEmail" class="user-email"></div>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <script>
        // Конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCgb60YBJ9CtE0jz7Z7nKG5V2-NpTaF5yw",
            authDomain: "zeno-offisal.firebaseapp.com",
            projectId: "zeno-offisal",
            storageBucket: "zeno-offisal.firebasestorage.app",
            messagingSenderId: "280179393071",
            appId: "1:280179393071:web:227a3806f74cd59e04fcda"
        };
        
        // Инициализация Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Настройка Google провайдера
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({
            'login_hint': 'user@example.com'
        });
        
        // Элементы DOM
        const loginScreen = document.getElementById('loginScreen');
        const profileScreen = document.getElementById('profileScreen');
        const googleLoginBtn = document.getElementById('googleLogin');
        const logoutBtn = document.getElementById('logoutBtn');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        
        // Вход через Google
        googleLoginBtn.onclick = () => {
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    saveUserToFirestore(user);
                    showProfile(user);
                })
                .catch((error) => {
                    console.error('Ошибка входа:', error);
                    alert('Ошибка: ' + error.message);
                });
        };
        
        // Сохранение пользователя в Firestore
        function saveUserToFirestore(user) {
            db.collection('users').doc(user.uid).set({
                name: user.displayName,
                email: user.email,
                photoURL: user.photoURL,
                lastLogin: new Date()
            }, { merge: true });
        }
        
        // Показать профиль
        function showProfile(user) {
            userAvatar.src = user.photoURL || 'https://via.placeholder.com/60';
            userName.textContent = user.displayName || 'Пользователь';
            userEmail.textContent = user.email;
            
            loginScreen.classList.add('hidden');
            profileScreen.classList.remove('hidden');
        }
        
        // Выход
        logoutBtn.onclick = () => {
            auth.signOut().then(() => {
                loginScreen.classList.remove('hidden');
                profileScreen.classList.add('hidden');
            });
        };
        
        // Проверка состояния входа
        auth.onAuthStateChanged((user) => {
            if (user) {
                showProfile(user);
            } else {
                loginScreen.classList.remove('hidden');
                profileScreen.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
