<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeno Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        /* Карточка */
        .card {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        /* Логотип */
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        
        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #8E8E93;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        /* Поля ввода */
        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #2AABEE;
        }
        
        /* Кнопки */
        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #2AABEE;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Поля для кода */
        .code-digits {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        
        .code-digit {
            width: 52px;
            height: 64px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
        }
        
        .code-digit:focus {
            outline: none;
            border-color: #2AABEE;
        }
        
        .phone-number {
            text-align: center;
            color: #2AABEE;
            font-weight: 500;
            margin-bottom: 16px;
        }
        
        .resend-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .resend-link a {
            color: #2AABEE;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Чат */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2C2C2E;
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        
        .chat-user {
            flex: 1;
        }
        
        .chat-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        .chat-status {
            font-size: 12px;
            color: #8E8E93;
        }
        
        .back-btn {
            background: none;
            width: auto;
            padding: 8px 12px;
            font-size: 24px;
        }
        
        .messages-area {
            height: 400px;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message-mine {
            background: #2AABEE;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-theirs {
            background: #2C2C2E;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
            text-align: right;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2C2C2E;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2C2C2E;
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 16px;
        }
        
        .message-input:focus {
            outline: none;
        }
        
        .send-btn {
            width: auto;
            padding: 12px 24px;
            background: #2AABEE;
            border-radius: 24px;
        }
        
        /* Список чатов */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #2C2C2E;
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-item:hover {
            background: #3A3A3C;
        }
        
        .chat-item-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .chat-item-info {
            flex: 1;
        }
        
        .chat-item-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }
        
        .chat-item-preview {
            font-size: 12px;
            color: #8E8E93;
        }
        
        .hidden {
            display: none;
        }
        
        /* Табы */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: #2C2C2E;
            border-radius: 14px;
            cursor: pointer;
            color: #8E8E93;
        }
        
        .tab.active {
            background: #2AABEE;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <!-- Экран 1: Вход -->
        <div id="loginScreen">
            <div class="logo">Z</div>
            <h1>ZENO</h1>
            <div class="subtitle">Мессенджер будущего</div>
            <input type="tel" id="phoneInput" class="input-field" placeholder="+7 900 000 00 00">
            <button id="nextBtn">Далее</button>
        </div>
        
        <!-- Экран 2: Код -->
        <div id="codeScreen" class="hidden">
            <div class="logo">Z</div>
            <h1>ZENO</h1>
            <div class="subtitle">Введите код из SMS</div>
            <div class="phone-number" id="displayPhone"></div>
            <div class="code-digits">
                <input type="text" maxlength="1" class="code-digit" id="code1">
                <input type="text" maxlength="1" class="code-digit" id="code2">
                <input type="text" maxlength="1" class="code-digit" id="code3">
                <input type="text" maxlength="1" class="code-digit" id="code4">
                <input type="text" maxlength="1" class="code-digit" id="code5">
                <input type="text" maxlength="1" class="code-digit" id="code6">
            </div>
            <button id="verifyBtn" disabled>Подтвердить</button>
            <div class="resend-link">
                <a id="resendBtn">Не пришел код? Отправить снова</a>
            </div>
        </div>
        
        <!-- Экран 3: Главный -->
        <div id="mainScreen" class="hidden">
            <div class="tabs">
                <div class="tab active" data-tab="chats">Чаты</div>
                <div class="tab" data-tab="contacts">Контакты</div>
            </div>
            
            <!-- Список чатов -->
            <div id="chatsView">
                <div class="chat-list" id="chatList"></div>
            </div>
            
            <!-- Список контактов -->
            <div id="contactsView" class="hidden">
                <div class="chat-list" id="contactsList"></div>
            </div>
        </div>
        
        <!-- Экран 4: Чат -->
        <div id="chatScreen" class="hidden">
            <div class="chat-header">
                <button id="backToMainBtn" class="back-btn">←</button>
                <div class="chat-avatar" id="chatAvatar">U</div>
                <div class="chat-user">
                    <div class="chat-name" id="chatUserName"></div>
                    <div class="chat-status">online</div>
                </div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение">
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let currentChatUser = null;
        let messages = {}; // { "userId": [{text, time, fromMe}] }
        let users = [
            { id: "user2", name: "Анна", avatar: "А", phone: "+7 900 111 22 33" },
            { id: "user3", name: "Дмитрий", avatar: "Д", phone: "+7 900 444 55 66" },
            { id: "user4", name: "Екатерина", avatar: "Е", phone: "+7 900 777 88 99" }
        ];
        
        // Инициализация сообщений
        if (!localStorage.getItem('zeno_messages')) {
            messages = {};
            localStorage.setItem('zeno_messages', JSON.stringify(messages));
        } else {
            messages = JSON.parse(localStorage.getItem('zeno_messages'));
        }
        
        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const codeScreen = document.getElementById('codeScreen');
        const mainScreen = document.getElementById('mainScreen');
        const chatScreen = document.getElementById('chatScreen');
        
        const phoneInput = document.getElementById('phoneInput');
        const nextBtn = document.getElementById('nextBtn');
        const displayPhone = document.getElementById('displayPhone');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        
        const chatsView = document.getElementById('chatsView');
        const contactsView = document.getElementById('contactsView');
        const chatList = document.getElementById('chatList');
        const contactsList = document.getElementById('contactsList');
        
        const chatUserName = document.getElementById('chatUserName');
        const chatAvatar = document.getElementById('chatAvatar');
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const backToMainBtn = document.getElementById('backToMainBtn');
        
        // Код для входа
        const codeInputs = ['code1', 'code2', 'code3', 'code4', 'code5', 'code6'].map(id => document.getElementById(id));
        
        // ========== ФУНКЦИИ ВХОДА ==========
        function checkCodeComplete() {
            let allFilled = codeInputs.every(input => input.value.length === 1);
            verifyBtn.disabled = !allFilled;
        }
        
        function setupCodeInputs() {
            codeInputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value.length === 1 && index < 5) {
                        codeInputs[index + 1].focus();
                    }
                    checkCodeComplete();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value.length === 0 && index > 0) {
                        codeInputs[index - 1].focus();
                    }
                });
            });
        }
        
        nextBtn.onclick = () => {
            if (phoneInput.value.trim()) {
                currentUser = { id: "user1", name: phoneInput.value, avatar: "U" };
                displayPhone.textContent = phoneInput.value;
                loginScreen.classList.add('hidden');
                codeScreen.classList.remove('hidden');
            }
        };
        
        verifyBtn.onclick = () => {
            let code = codeInputs.map(i => i.value).join('');
            if (code.length === 6) {
                codeScreen.classList.add('hidden');
                mainScreen.classList.remove('hidden');
                renderChatList();
                renderContactsList();
            }
        };
        
        resendBtn.onclick = () => {
            codeInputs.forEach(input => input.value = '');
            verifyBtn.disabled = true;
            codeInputs[0].focus();
        };
        
        // ========== ЧАТ ==========
        function renderMessages() {
            if (!currentChatUser) return;
            const chatId = currentChatUser.id;
            const chatMessages = messages[chatId] || [];
            
            messagesArea.innerHTML = '';
            chatMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromMe ? 'message-mine' : 'message-theirs'}`;
                div.innerHTML = `${msg.text}<div class="message-time">${msg.time}</div>`;
                messagesArea.appendChild(div);
            });
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChatUser) return;
            
            const chatId = currentChatUser.id;
            if (!messages[chatId]) messages[chatId] = [];
            
            messages[chatId].push({
                text: text,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fromMe: true
            });
            
            // Симулируем ответ
            setTimeout(() => {
                if (!messages[chatId]) messages[chatId] = [];
                messages[chatId].push({
                    text: "Спасибо за сообщение! Я сейчас занят, отвечу позже.",
                    time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    fromMe: false
                });
                localStorage.setItem('zeno_messages', JSON.stringify(messages));
                if (currentChatUser && currentChatUser.id === chatId) {
                    renderMessages();
                }
                renderChatList();
            }, 1000);
            
            localStorage.setItem('zeno_messages', JSON.stringify(messages));
            renderMessages();
            messageInput.value = '';
            renderChatList();
        }
        
        function openChat(user) {
            currentChatUser = user;
            chatUserName.textContent = user.name;
            chatAvatar.textContent = user.avatar;
            mainScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            renderMessages();
        }
        
        function renderChatList() {
            chatList.innerHTML = '';
            users.forEach(user => {
                const chatId = user.id;
                const lastMsg = messages[chatId] && messages[chatId].length > 0 
                    ? messages[chatId][messages[chatId].length - 1].text 
                    : "Нет сообщений";
                
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="chat-item-avatar">${user.avatar}</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">${user.name}</div>
                        <div class="chat-item-preview">${lastMsg.substring(0, 30)}</div>
                    </div>
                `;
                div.onclick = () => openChat(user);
                chatList.appendChild(div);
            });
        }
        
        function renderContactsList() {
            contactsList.innerHTML = '';
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="chat-item-avatar">${user.avatar}</div>
                    <div class="chat-item-info">
                        <div class="chat-item-name">${user.name}</div>
                        <div class="chat-item-preview">${user.phone}</div>
                    </div>
                `;
                div.onclick = () => openChat(user);
                contactsList.appendChild(div);
            });
        }
        
        // ========== ТАБЫ ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'chats') {
                    chatsView.classList.remove('hidden');
                    contactsView.classList.add('hidden');
                } else {
                    chatsView.classList.add('hidden');
                    contactsView.classList.remove('hidden');
                }
            };
        });
        
        backToMainBtn.onclick = () => {
            chatScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            currentChatUser = null;
        };
        
        sendBtn
