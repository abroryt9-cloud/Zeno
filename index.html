<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeno</title>
  <style>
    :root {
      --bg1: #7c3aed;
      --bg2: #2563eb;
      --card: rgba(255, 255, 255, 0.92);
      --text: #0f172a;
      --muted: rgba(15, 23, 42, 0.65);
      --ring: rgba(99, 102, 241, 0.35);
      --primary1: #7c3aed;
      --primary2: #2563eb;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
        "Segoe UI Emoji";
      color: var(--text);
      background: radial-gradient(1200px circle at 20% 10%, rgba(124, 58, 237, 0.45), transparent 55%),
        radial-gradient(1000px circle at 80% 20%, rgba(37, 99, 235, 0.45), transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      max-height: calc(100vh - 36px);
      backdrop-filter: blur(10px);
    }

    .cardHeader {
      padding: 20px 18px 14px 18px;
      text-align: center;
    }

    .brand {
      margin: 0;
      letter-spacing: 0.14em;
      font-weight: 900;
      font-size: 22px;
    }

    .subtitle {
      margin: 8px 0 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      padding: 14px 18px 16px 18px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .screen {
      display: none;
      animation: fadeIn 180ms ease-out;
    }
    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fieldLabel {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.85);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: box-shadow 120ms ease, border-color 120ms ease;
    }

    .input:focus {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 0 5px var(--ring);
    }

    .btn {
      width: 100%;
      height: 46px;
      margin-top: 12px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      color: white;
      font-weight: 700;
      font-size: 15px;
      background: linear-gradient(135deg, var(--primary1), var(--primary2));
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.22);
      transition: transform 100ms ease, filter 100ms ease, opacity 120ms ease;
    }

    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(10%);
    }

    .codeRow {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: nowrap;
    }

    .codeInput {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 19px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: rgba(255, 255, 255, 0.85);
      outline: none;
      transition: box-shadow 120ms ease, border-color 120ms ease;
    }

    .codeInput:focus {
      border-color: rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 0 5px var(--ring);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12.5px;
      text-align: center;
      line-height: 1.25;
    }

    .welcome {
      text-align: center;
      padding: 8px 4px 6px 4px;
    }

    .welcomeTitle {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .welcomeBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(22, 163, 74, 0.25);
      background: rgba(22, 163, 74, 0.08);
      color: var(--success);
      font-weight: 700;
      font-size: 13px;
    }

    @media (min-width: 800px) {
      .app { max-width: 520px; }
      .cardHeader { padding-top: 26px; }
    }

    @media (max-width: 420px) {
      body { padding: 12px; }
      .cardHeader { padding-left: 14px; padding-right: 14px; }
      .cardHeader { padding-top: 16px; padding-bottom: 10px; }
      .content { padding-left: 14px; padding-right: 14px; }
      .content { padding-top: 12px; padding-bottom: 12px; }
      .subtitle { font-size: 12.5px; }
      .btn { height: 44px; }
    }

    #screen-code.active {
      display: flex;
      flex-direction: column;
    }

    #screen-code .fieldLabel {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card" role="application" aria-label="Zeno web">
      <div class="cardHeader">
        <h1 class="brand">ZENO</h1>
        <p class="subtitle" id="subtitleText">Вход по номеру телефона</p>
      </div>

      <div class="content">
        <div class="screen active" id="screen-enter">
          <label class="fieldLabel" for="phone">Номер телефона</label>
          <input
            class="input"
            id="phone"
            type="tel"
            inputmode="tel"
            autocomplete="tel"
            placeholder="+7 999 123-45-67"
          />
          <button class="btn" id="btnNext" type="button" disabled>Далее</button>
          <div class="hint">Укажите номер, чтобы мы отправили код подтверждения.</div>
        </div>

        <div class="screen" id="screen-code">
          <label class="fieldLabel" for="codeInputs">Код подтверждения</label>
          <div class="codeRow" id="codeInputs" aria-label="Введите 6-значный код">
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
            <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
          </div>
          <button class="btn" id="btnConfirm" type="button" disabled>Подтвердить</button>
          <div class="hint">Вводите цифры — фокус будет двигаться автоматически.</div>
        </div>

        <div class="screen" id="screen-main">
          <div class="welcome">
            <p class="welcomeTitle" id="welcomeTitle">Добро пожаловать!</p>
            <div class="welcomeBadge">
              <span aria-hidden="true">✓</span>
              <span id="welcomeMeta">Вы успешно вошли</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const phoneEl = document.getElementById('phone');
    const btnNext = document.getElementById('btnNext');

    const screenEnter = document.getElementById('screen-enter');
    const screenCode = document.getElementById('screen-code');
    const screenMain = document.getElementById('screen-main');

    const btnConfirm = document.getElementById('btnConfirm');
    const codeInputsWrap = document.getElementById('codeInputs');
    const codeInputs = Array.from(codeInputsWrap.querySelectorAll('input.codeInput'));

    function digitsOnly(s) {
      return String(s || '').replace(/\\D/g, '');
    }

    function setScreen(which) {
      screenEnter.classList.remove('active');
      screenCode.classList.remove('active');
      screenMain.classList.remove('active');

      if (which === 'enter') screenEnter.classList.add('active');
      if (which === 'code') screenCode.classList.add('active');
      if (which === 'main') screenMain.classList.add('active');
    }

    function updateNextState() {
      // Минимум: 10 цифр (типовой номер в RU/СНГ).
      const d = digitsOnly(phoneEl.value);
      btnNext.disabled = d.length < 10;
    }

    phoneEl.addEventListener('input', updateNextState);
    updateNextState();

    function checkCodeComplete() {
      // Активируем кнопку только когда заполнены ВСЕ 6 полей.
      const code = codeInputs.map((el) => el.value).join('');
      const ok = /^\\d{6}$/.test(code);
      btnConfirm.disabled = !ok;
      return ok;
    }

    function getCode() {
      return codeInputs.map((el) => el.value).join('');
    }

    btnNext.addEventListener('click', () => {
      const phoneDigits = digitsOnly(phoneEl.value);
      if (phoneDigits.length < 10) return;

      // Очистить код и включить экран ввода.
      codeInputs.forEach((el) => (el.value = ''));
      btnConfirm.disabled = true;
      setScreen('code');
      codeInputs[0].focus();
    });

    codeInputs.forEach((el, idx) => {
      el.addEventListener('input', () => {
        const d = digitsOnly(el.value);

        // Ничего полезного не ввели.
        if (d.length === 0) {
          el.value = '';
          checkCodeComplete();
          return;
        }

        // Перезаписываем начиная с текущего поля, чтобы не оставались "хвосты".
        for (let j = idx; j < codeInputs.length; j++) codeInputs[j].value = '';

        for (let i = 0; i < d.length && idx + i < codeInputs.length; i++) {
          codeInputs[idx + i].value = d[i];
        }

        const nextIndex = Math.min(idx + d.length, codeInputs.length - 1);
        codeInputs[nextIndex].focus();
        checkCodeComplete();
      });

      el.addEventListener('keydown', (e) => {
        if (e.key !== 'Backspace') return;

        // Требование: Backspace -> фокус на предыдущее поле.
        if (idx === 0) {
          e.preventDefault();
          el.value = '';
          checkCodeComplete();
          return;
        }

        // Если в текущем поле есть цифра — очищаем текущую и не переключаемся.
        if (el.value && el.value.length > 0) {
          e.preventDefault();
          el.value = '';
          checkCodeComplete();
          return;
        }

        // Если текущее поле пустое — перейти назад, очистив предыдущее.
        e.preventDefault();
        const prev = codeInputs[idx - 1];
        prev.value = '';
        prev.focus();
        checkCodeComplete();
      });
    });

    btnConfirm.addEventListener('click', () => {
      if (!checkCodeComplete()) return;
      const code = getCode();
      const phoneDigits = digitsOnly(phoneEl.value);

      // Показываем приветствие после успешного подтверждения (проверка по требованию: любой 6-значный).
      const maskedPhone =
        phoneDigits.length >= 10
          ? phoneDigits.slice(0, 2) + ' ' + phoneDigits.slice(2, 5) + '-' + phoneDigits.slice(5, 7) + '-' + phoneDigits.slice(7, 10)
          : phoneEl.value;

      document.getElementById('welcomeMeta').textContent =
        'Вошли: ' + maskedPhone + ' (код: ' + code + ')';

      setScreen('main');
    });

    // Поддержка вставки кода целиком (и почти целиком).
    codeInputsWrap.addEventListener('paste', (e) => {
      const text = e.clipboardData ? e.clipboardData.getData('text') : '';
      const d = digitsOnly(text).slice(0, 6);
      if (d.length === 0) return;

      e.preventDefault();
      codeInputs.forEach((el) => (el.value = ''));
      d.split('').forEach((ch, i) => (codeInputs[i].value = ch));

      const lastFilled = Math.min(d.length - 1, codeInputs.length - 1);
      codeInputs[lastFilled].focus();
      checkCodeComplete();
    });

    // Инициализация состояния.
    checkCodeComplete();
  </script>
</body>
</html>
