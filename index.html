<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zeno Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0F0F0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .card {
            background: #1E1E1E;
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #2AABEE 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #8E8E93;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .input-field {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #2AABEE;
        }
        
        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            background: #2AABEE;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .code-digits {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
        }
        
        .code-digit {
            width: 52px;
            height: 64px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            background: #2C2C2E;
            border: 1px solid #3A3A3C;
            border-radius: 14px;
            color: white;
        }
        
        .code-digit:focus {
            outline: none;
            border-color: #2AABEE;
        }
        
        .phone-number {
            text-align: center;
            color: #2AABEE;
            margin-bottom: 16px;
        }
        
        .resend-link {
            margin-top: 20px;
        }
        
        .resend-link a {
            color: #2AABEE;
            text-decoration: none;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2C2C2E;
        }
        
        .back-btn {
            width: auto;
            padding: 8px 16px;
            background: #2C2C2E;
            font-size: 20px;
        }
        
        .messages-area {
            height: 400px;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
        }
        
        .message-mine {
            background: #2AABEE;
            color: white;
            align-self: flex-end;
        }
        
        .message-theirs {
            background: #2C2C2E;
            color: white;
            align-self: flex-start;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2C2C2E;
            border: none;
            border-radius: 24px;
            color: white;
        }
        
        .send-btn {
            width: auto;
            padding: 12px 24px;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <!-- Экран 1: Вход -->
        <div id="loginScreen">
            <div class="logo">Z</div>
            <h1>ZENO</h1>
            <div class="subtitle">Мессенджер будущего</div>
            <input type="tel" id="phoneInput" class="input-field" placeholder="+7 900 000 00 00">
            <button id="nextBtn">Далее</button>
        </div>
        
        <!-- Экран 2: Код -->
        <div id="codeScreen" class="hidden">
            <div class="logo">Z</div>
            <h1>ZENO</h1>
            <div class="subtitle">Введите код из SMS</div>
            <div class="phone-number" id="displayPhone"></div>
            <div class="code-digits">
                <input type="text" maxlength="1" class="code-digit" id="code1">
                <input type="text" maxlength="1" class="code-digit" id="code2">
                <input type="text" maxlength="1" class="code-digit" id="code3">
                <input type="text" maxlength="1" class="code-digit" id="code4">
                <input type="text" maxlength="1" class="code-digit" id="code5">
                <input type="text" maxlength="1" class="code-digit" id="code6">
            </div>
            <button id="verifyBtn" disabled>Подтвердить</button>
            <div class="resend-link">
                <a id="resendBtn">Не пришел код? Отправить снова</a>
            </div>
        </div>
        
        <!-- Экран 3: Чат -->
        <div id="chatScreen" class="hidden">
            <div class="chat-header">
                <button id="logoutBtn" class="back-btn">← Выйти</button>
                <div style="flex:1; text-align:center; font-weight:bold; color:white;">Чат</div>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение">
                <button id="sendBtn" class="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // Элементы
        const loginScreen = document.getElementById('loginScreen');
        const codeScreen = document.getElementById('codeScreen');
        const chatScreen = document.getElementById('chatScreen');
        
        const phoneInput = document.getElementById('phoneInput');
        const nextBtn = document.getElementById('nextBtn');
        const displayPhone = document.getElementById('displayPhone');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // Поля кода
        const codeInputs = [
            document.getElementById('code1'),
            document.getElementById('code2'),
            document.getElementById('code3'),
            document.getElementById('code4'),
            document.getElementById('code5'),
            document.getElementById('code6')
        ];
        
        let currentPhone = '';
        let messages = [];
        
        // Функция проверки кода
        function checkCodeComplete() {
            let allFilled = true;
            for (let i = 0; i < codeInputs.length; i++) {
                if (codeInputs[i].value.length !== 1) {
                    allFilled = false;
                    break;
                }
            }
            verifyBtn.disabled = !allFilled;
        }
        
        // Настройка полей кода
        for (let i = 0; i < codeInputs.length; i++) {
            codeInputs[i].addEventListener('input', function() {
                if (this.value.length === 1 && i < codeInputs.length - 1) {
                    codeInputs[i + 1].focus();
                }
                checkCodeComplete();
            });
            
            codeInputs[i].addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && i > 0) {
                    codeInputs[i - 1].focus();
                }
            });
        }
        
        // Кнопка "Далее"
        nextBtn.onclick = function() {
            let phone = phoneInput.value.trim();
            if (phone.length > 0) {
                currentPhone = phone;
                displayPhone.textContent = phone;
                loginScreen.classList.add('hidden');
                codeScreen.classList.remove('hidden');
            } else {
                alert('Введите номер телефона');
            }
        };
        
        // Кнопка "Подтвердить"
        verifyBtn.onclick = function() {
            let code = '';
            for (let i = 0; i < codeInputs.length; i++) {
                code += codeInputs[i].value;
            }
            if (code.length === 6) {
                codeScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                
                // Добавляем приветственное сообщение
                messages = [];
                addMessage('Добро пожаловать в Zeno!', false);
            }
        };
        
        // Отправить снова
        resendBtn.onclick = function() {
            for (let i = 0; i < codeInputs.length; i++) {
                codeInputs[i].value = '';
            }
            verifyBtn.disabled = true;
            codeInputs[0].focus();
            alert('Код отправлен заново (демо-режим)');
        };
        
        // Выход
        logoutBtn.onclick = function() {
            chatScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            phoneInput.value = '';
            for (let i = 0; i < codeInputs.length; i++) {
                codeInputs[i].value = '';
            }
            messages = [];
        };
        
        // Добавить сообщение
        function addMessage(text, isFromMe) {
            messages.push({
                text: text,
                isFromMe: isFromMe,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            });
            renderMessages();
        }
        
        // Отобразить сообщения
        function renderMessages() {
            messagesArea.innerHTML = '';
            for (let i = 0; i < messages.length; i++) {
                const msg = messages[i];
                const div = document.createElement('div');
                div.className = 'message ' + (msg.isFromMe ? 'message-mine' : 'message-theirs');
                div.innerHTML = msg.text + '<div style="font-size:10px; opacity:0.6; margin-top:4px;">' + msg.time + '</div>';
                messagesArea.appendChild(div);
            }
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        // Отправить сообщение
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text === '') return;
            
            addMessage(text, true);
            messageInput.value = '';
            
            // Автоответ через 1 секунду
            setTimeout(function() {
                addMessage('Спасибо за сообщение! (автоответ)', false);
            }, 1000);
        }
        
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
