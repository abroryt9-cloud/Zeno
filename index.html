<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zeno</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --card: #1e1e1e;
        --accent: #2aabee;
        --text: #ffffff;
        --muted: #8e8e93;
        --border: rgba(255, 255, 255, 0.08);
        --bubble-me: #2aabee;
        --bubble-them: #2b2b2b;
        --composer-bg: #0f0f0f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }

      .app {
        width: 100%;
        max-width: 980px;
        height: min(100vh - 24px, 820px);
      }

      .shell {
        height: 100%;
        border-radius: 18px;
        overflow: hidden;
        background: var(--card);
        border: 1px solid var(--border);
      }

      .screen {
        display: none;
        height: 100%;
      }

      .screen.active {
        display: flex;
        flex-direction: column;
      }

      .auth {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 22px;
      }

      .logo {
        text-align: center;
        margin-bottom: 18px;
      }

      .logoTitle {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.12em;
        font-weight: 900;
      }

      .authTitle {
        margin: 10px 0 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .formCard {
        width: min(440px, 100%);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid var(--border);
        padding: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .input {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        padding: 0 14px;
        font-size: 15px;
        color: var(--text);
        outline: none;
      }

      .input:focus {
        border-color: rgba(42, 171, 238, 0.55);
        box-shadow: 0 0 0 5px rgba(42, 171, 238, 0.15);
      }

      .btn {
        width: 100%;
        height: 46px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        font-weight: 800;
        font-size: 15px;
        background: var(--accent);
        color: #041018;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:disabled {
        opacity: 0.48;
        background: rgba(42, 171, 238, 0.35);
        cursor: not-allowed;
        color: var(--text);
      }

      .btnRow {
        margin-top: 12px;
      }

      .codeRow {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 8px;
        margin-bottom: 12px;
      }

      .codeInput {
        width: 50px;
        height: 60px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        color: var(--text);
        text-align: center;
        font-size: 20px;
        font-weight: 800;
        outline: none;
      }

      .codeInput:focus {
        border-color: rgba(42, 171, 238, 0.55);
        box-shadow: 0 0 0 5px rgba(42, 171, 238, 0.15);
      }

      .hint {
        margin-top: 8px;
        text-align: center;
        color: var(--muted);
        font-size: 12.5px;
        line-height: 1.2;
      }

      .resend {
        margin-top: 14px;
        text-align: center;
      }

      .linkBtn {
        border: none;
        background: none;
        color: rgba(42, 171, 238, 0.95);
        font-weight: 800;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      /* Chat layout */
      .chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .topBar {
        height: 64px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 12px;
        border-bottom: 1px solid var(--border);
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(42, 171, 238, 0.9), rgba(124, 58, 237, 0.65));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        color: #05111a;
      }

      .topMeta {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .userName {
        font-weight: 900;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .userSub {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chatBody {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .sidebar {
        width: 280px;
        border-right: 1px solid var(--border);
        padding: 10px;
        overflow-y: auto;
      }

      .sidebarTitle {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        margin: 4px 6px 10px 6px;
      }

      .chatItem {
        width: 100%;
        border: 1px solid transparent;
        background: transparent;
        color: var(--text);
        text-align: left;
        padding: 10px 10px;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .chatItem:hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .chatItem.active {
        border-color: rgba(42, 171, 238, 0.35);
        background: rgba(42, 171, 238, 0.08);
      }

      .chatItemName {
        font-weight: 900;
        font-size: 14px;
      }

      .chatItemPreview {
        color: var(--muted);
        font-size: 12.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .conversation {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .messages {
        flex: 1;
        padding: 14px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.08);
      }

      .msgRow {
        display: flex;
        margin: 8px 0;
      }

      .msgRow.me {
        justify-content: flex-end;
      }

      .msgRow.them {
        justify-content: flex-start;
      }

      .bubble {
        max-width: 76%;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--border);
        font-size: 14px;
        line-height: 1.25;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .bubble.me {
        background: rgba(42, 171, 238, 0.95);
        border-color: rgba(42, 171, 238, 0.35);
        color: #041018;
      }

      .bubble.them {
        background: rgba(30, 30, 30, 0.95);
        border-color: var(--border);
        color: var(--text);
      }

      .composer {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: rgba(0, 0, 0, 0.15);
      }

      .composerInput {
        flex: 1;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.45);
        color: var(--text);
        padding: 12px 12px;
        font-size: 14px;
        outline: none;
        resize: none;
        min-height: 46px;
        max-height: 120px;
      }

      .sendBtn {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #041018;
        font-weight: 900;
        flex-shrink: 0;
      }

      /* Responsive */
      @media (max-width: 720px) {
        .app {
          max-width: 100%;
          height: 100vh;
          border-radius: 0;
        }
        body {
          padding: 0;
        }
        .shell {
          border-radius: 0;
        }
        .sidebar {
          width: 240px;
        }
      }

      /* Phone: sidebar becomes a horizontal strip */
      @media (max-width: 520px) {
        .chatBody {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--border);
          display: flex;
          overflow-x: auto;
          overflow-y: hidden;
          padding: 10px 10px;
          gap: 8px;
        }
        .sidebarTitle {
          display: none;
        }
        .chatItem {
          min-width: 180px;
        }
        .bubble {
          max-width: 88%;
        }
      }

      /* Узкие экраны: поджимаем зазор OTP-полей, сохраняя 50x60 */
      @media (max-width: 420px) {
        .formCard {
          padding: 16px;
        }
        .codeRow {
          gap: 6px;
        }
      }

      @media (max-width: 360px) {
        .codeRow {
          gap: 4px;
        }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="shell">
        <!-- AUTH: ENTER PHONE -->
        <section class="screen active" id="screen-enter">
          <div class="auth">
            <div class="logo">
              <h1 class="logoTitle">ZENO</h1>
              <div class="authTitle" id="enterSubtitle">Вход по номеру телефона</div>
            </div>

            <div class="formCard">
              <label for="phone">Номер телефона</label>
              <input
                class="input"
                id="phone"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
                placeholder="+7 999 123-45-67"
              />

              <div class="btnRow">
                <button class="btn" id="btnNext" type="button" disabled>Далее</button>
              </div>

              <div class="hint">Мы отправим код подтверждения на указанный номер.</div>
            </div>
          </div>
        </section>

        <!-- AUTH: VERIFY CODE -->
        <section class="screen" id="screen-code">
          <div class="auth">
            <div class="logo">
              <h1 class="logoTitle">ZENO</h1>
              <div class="authTitle">Введите код из SMS</div>
            </div>

            <div class="formCard">
              <label for="codeInputs">Код подтверждения</label>

              <div class="codeRow" id="codeInputsWrap" aria-label="Введите 6-значный код">
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
                <input class="codeInput" maxlength="1" inputmode="numeric" autocomplete="one-time-code" />
              </div>

              <div class="btnRow">
                <button class="btn" id="btnConfirm" type="button" disabled>Подтвердить</button>
              </div>

              <div class="resend">
                <button class="linkBtn" id="resendLink" type="button">Не пришел код? Отправить снова</button>
              </div>
            </div>
          </div>
        </section>

        <!-- CHAT MAIN SCREEN -->
        <section class="screen" id="screen-main">
          <div class="chat">
            <div class="topBar">
              <div class="avatar" id="avatar">U</div>
              <div class="topMeta">
                <div class="userName" id="userName">Пользователь</div>
                <div class="userSub" id="userSub">Zeno • Чаты</div>
              </div>
            </div>

            <div class="chatBody">
              <aside class="sidebar" id="chatList"></aside>

              <div class="conversation">
                <div class="messages" id="messages" aria-label="Сообщения"></div>

                <div class="composer">
                  <textarea
                    class="composerInput"
                    id="messageInput"
                    rows="1"
                    placeholder="Сообщение…"
                  ></textarea>
                  <button class="sendBtn" id="sendBtn" type="button" aria-label="Отправить">
                    ↗
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const phoneEl = document.getElementById("phone");
      const btnNext = document.getElementById("btnNext");

      const screenEnter = document.getElementById("screen-enter");
      const screenCode = document.getElementById("screen-code");
      const screenMain = document.getElementById("screen-main");

      const btnConfirm = document.getElementById("btnConfirm");
      const resendLink = document.getElementById("resendLink");
      const codeInputsWrap = document.getElementById("codeInputsWrap");
      const codeInputs = Array.from(codeInputsWrap.querySelectorAll("input.codeInput"));

      const avatarEl = document.getElementById("avatar");
      const userNameEl = document.getElementById("userName");
      const messagesEl = document.getElementById("messages");
      const chatListEl = document.getElementById("chatList");
      const messageInputEl = document.getElementById("messageInput");
      const sendBtnEl = document.getElementById("sendBtn");

      // --- State ---
      let currentPhoneDigits = "";
      let selectedChatId = null;

      // demo model: chat messages kept in JS state
      const chats = [
        {
          id: "c1",
          name: "Дима",
          messages: [
            { from: "them", text: "Привет! Ты в Zeno?" },
            { from: "me", text: "Да, только начал." },
            { from: "them", text: "Круто. Давай попробуем чат." }
          ],
        },
        {
          id: "c2",
          name: "Анна",
          messages: [
            { from: "them", text: "Какой код ввода?" },
            { from: "me", text: "Любой 6-значный подходит :)"},
            { from: "them", text: "Ок, работает!" }
          ],
        },
        {
          id: "c3",
          name: "Поддержка",
          messages: [
            { from: "them", text: "Если что — напиши нам сообщение ниже." }
          ],
        },
      ];

      // --- Helpers ---
      function digitsOnly(s) {
        return String(s || "").replace(/\D/g, "");
      }

      function setScreen(which) {
        screenEnter.classList.remove("active");
        screenCode.classList.remove("active");
        screenMain.classList.remove("active");

        if (which === "enter") screenEnter.classList.add("active");
        if (which === "code") screenCode.classList.add("active");
        if (which === "main") screenMain.classList.add("active");
      }

      function checkCodeComplete() {
        const code = codeInputs.map((el) => el.value).join("");
        const ok = /^\d{6}$/.test(code);
        btnConfirm.disabled = !ok;
        return ok;
      }

      function getCode() {
        return codeInputs.map((el) => el.value).join("");
      }

      function clearCodeInputs() {
        codeInputs.forEach((el) => (el.value = ""));
        btnConfirm.disabled = true;
      }

      function focusCodeIndex(i) {
        const idx = Math.max(0, Math.min(i, codeInputs.length - 1));
        codeInputs[idx].focus();
        codeInputs[idx].select?.();
      }

      function getUserNameFromPhone(phoneDigits) {
        // Требование: показывать имя пользователя.
        // Делаем детерминированно по номеру.
        const last4 = phoneDigits.slice(-4);
        return last4 ? "Пользователь " + last4 : "Пользователь";
      }

      function getAvatarLetter(userName) {
        const first = (userName || "U").trim().charAt(0).toUpperCase();
        return first || "U";
      }

      // --- AUTH: PHONE ---
      function updateNextState() {
        const d = digitsOnly(phoneEl.value);
        btnNext.disabled = d.length === 0;
      }

      phoneEl.addEventListener("input", updateNextState);
      updateNextState();

      btnNext.addEventListener("click", () => {
        currentPhoneDigits = digitsOnly(phoneEl.value);
        if (!currentPhoneDigits) return;

        clearCodeInputs();
        setScreen("code");
        focusCodeIndex(0);
      });

      // --- AUTH: CODE INPUTS ---
      codeInputs.forEach((el, idx) => {
        el.addEventListener("input", () => {
          const d = digitsOnly(el.value);

          if (!d) {
            el.value = "";
            checkCodeComplete();
            return;
          }

          // У нас maxlength=1, но иногда браузер может вставить 2+ символа.
          let writeAt = idx;
          for (let i = 0; i < d.length && writeAt < codeInputs.length; i++) {
            codeInputs[writeAt].value = d[i];
            writeAt++;
          }

          const nextIndex = Math.min(writeAt, codeInputs.length - 1);
          focusCodeIndex(nextIndex);
          checkCodeComplete();
        });

        el.addEventListener("keydown", (e) => {
          if (e.key !== "Backspace") return;

          e.preventDefault();

          // Требование: курсор переходит к предыдущему полю.
          // Очищаем текущее поле и переходим назад (если idx > 0).
          el.value = "";
          if (idx > 0) focusCodeIndex(idx - 1);
          checkCodeComplete();
        });
      });

      // paste whole code
      codeInputsWrap.addEventListener("paste", (e) => {
        const text = e.clipboardData ? e.clipboardData.getData("text") : "";
        const d = digitsOnly(text).slice(0, 6);
        if (!d) return;

        e.preventDefault();
        clearCodeInputs();

        for (let i = 0; i < d.length; i++) codeInputs[i].value = d[i];
        focusCodeIndex(Math.min(d.length - 1, codeInputs.length - 1));
        checkCodeComplete();
      });

      btnConfirm.addEventListener("click", () => {
        if (!checkCodeComplete()) return;

        // Требование: проверка кода (подойдет любой 6-значный).
        const code = getCode();
        if (!/^\d{6}$/.test(code)) return;

        // Success -> main screen
        const userName = getUserNameFromPhone(currentPhoneDigits);
        userNameEl.textContent = userName;
        avatarEl.textContent = getAvatarLetter(userName);

        // init chat UI
        selectedChatId = chats[0]?.id || null;
        renderChatList();
        renderMessages();
        setScreen("main");

        // Focus composer
        setTimeout(() => messageInputEl.focus(), 0);
      });

      resendLink.addEventListener("click", () => {
        // Возврат на экран входа
        currentPhoneDigits = digitsOnly(phoneEl.value);
        clearCodeInputs();
        setScreen("enter");
        setTimeout(() => phoneEl.focus(), 0);
      });

      // --- CHAT RENDERING / SEND ---
      function getSelectedChat() {
        return chats.find((c) => c.id === selectedChatId) || chats[0];
      }

      function renderChatList() {
        const items = chats
          .map((c) => {
            const last = c.messages[c.messages.length - 1];
            const preview = last ? last.text : "Нет сообщений";
            const active = c.id === selectedChatId ? "active" : "";
            return `
              <button class="chatItem ${active}" type="button" data-chat-id="${c.id}">
                <div class="chatItemName">${c.name}</div>
                <div class="chatItemPreview">${preview}</div>
              </button>
            `;
          })
          .join("");

        chatListEl.innerHTML = `
          <div class="sidebarTitle">Чаты</div>
          ${items}
        `;

        chatListEl.querySelectorAll(".chatItem").forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedChatId = btn.getAttribute("data-chat-id");
            renderChatList();
            renderMessages();
          });
        });
      }

      function renderMessages() {
        const chat = getSelectedChat();
        const items = (chat?.messages || [])
          .map((m) => {
            const rowClass = m.from === "me" ? "me" : "them";
            const bubbleClass = m.from === "me" ? "me" : "them";
            return `
              <div class="msgRow ${rowClass}">
                <div class="bubble ${bubbleClass}">${escapeHtml(m.text)}</div>
              </div>
            `;
          })
          .join("");

        messagesEl.innerHTML = items;
        scrollMessagesToBottom();
      }

      function scrollMessagesToBottom() {
        // Scroll after layout
        requestAnimationFrame(() => {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        });
      }

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function sendMessage() {
        const chat = getSelectedChat();
        if (!chat) return;

        const text = String(messageInputEl.value || "").trim();
        if (!text) return;

        messageInputEl.value = "";
        messageInputEl.style.height = "";

        chat.messages.push({ from: "me", text });
        renderMessages();

        // demo reply
        setTimeout(() => {
          const replies = ["Понял!", "Ок.", "Отлично.", "Супер, давай дальше.", "Принято :)"];
          const reply = replies[Math.floor(Math.random() * replies.length)];
          chat.messages.push({ from: "them", text: reply });
          renderMessages();
        }, 550);
      }

      function autosizeTextarea(el) {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
      }

      messageInputEl.addEventListener("input", () => autosizeTextarea(messageInputEl));
      sendBtnEl.addEventListener("click", sendMessage);

      messageInputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
</html>
